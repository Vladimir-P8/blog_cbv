<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Мой Блог 2.0</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-2">
                {% if request.user.is_authenticated %}

                <!-- Кнопка «Добавить статью»-->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'post_create' %}" title="Добавить статью">
<!--                        Знак добавить статью-->
                        <i class="bi bi-journal-plus"></i>
                        </a>
                    </li>

                <!-- Кнопка «Редактировать статью»-->
                    <li class="nav-item">
                        <div class="d-flex justify-content-between align-items-start">
<!--            Чтобы не было ошибки, проверим, не пустой ли у нас slug-->
                        {% if post.slug %}
                            {% if request.user == post.author or request.user.is_superuser %}
<!--                                <button type="button" class="btn btn-default">-->
                                <a class="nav-link" href="{% url 'post_update' post.slug %}" title="Редактировать статью">
<!--                                    Знак карандаш-->
                                    <i class="bi bi-pencil"></i>
                                </a>
<!--                                </button-->
                            {% endif %}
                        {% endif %}
                        </div>
                    </li>

                <!-- Профиль пользователя с аватаром и slug -->
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-2" href="{% url 'profile_detail' request.user.profile.slug %}">
                            <img class="rounded-circle object-fit-cover" width="30" height="30" src="{{ request.user.profile.avatar.url }}" alt="avatar"/>
                            <span>{{ request.user.username }}</span>
                        </a>
                    </li>

                <!-- Выход через POST-форму, обязательный для Django 5 -->
                    <li class="nav-item">
                        <form action="{% url 'logout' %}" method="post" class="d-inline m-0">
                            {% csrf_token %}
                            <button type="submit" class="nav-link btn btn-link text-decoration-none border-0 py-0" title="Выход">
<!--                                Знак выход-->
<!--                            <i class="bi bi-door-open"></i>-->
<!--                                Знак выход-->
                            <i class="bi bi-box-arrow-right"></i>

                            </button>
                        </form>
                    </li>

                {% else %}



                <!-- Блок для гостей: Вход и Регистрация -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'login' %}" title="Вход">
<!--                            Знак дверь закрыта-->
<!--                        <i class="bi bi-door-closed"></i>-->
<!--                            Знак вход-->
                        <i class="bi bi-box-arrow-left"></i>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'register' %}" title="Регистрация">
<!--                            Знак добавить пользователя-->
                            <i class="bi bi-person-add"></i>
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

{% extends 'main.html' %}

{% block content %}
    <div class="card mb-3 border-0 nth-shadow">
        <div class="card-body">
            <div class="card-title nth-card-title">
                <h4>Авторизация на сайте</h4>
            </div>

            <a href="{% url 'social:begin' 'github' %}">Вход через GitHub</a>
            <br>
            <a href="{% url 'social:begin' 'google-oauth2' %}">Вход через Google</a>

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid gap-2 d-md-block mt-2">
                <button type="submit" class="btn btn-dark">Авторизоваться</button>
             </div>
            </form>
        </div>
    </div>
 <p><a href="{% url 'password_reset' %}">Забыли пароль?</a></p>
{% endblock %}

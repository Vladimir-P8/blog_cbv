{% extends 'main.html' %}

{% block title %}Забыли пароль?{% endblock %}

{% block content %}
  <h4>Забыли пароль?</h4>
  <p>Введите адрес своей электронной почты и мы пришлём инструкцию для получения нового пароля.</p>

  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Пришлите инструкцию!">
  </form>
{% endblock %}

openapi: 3.0.3
info:
  title: Blog 2.0 API Project
  version: 2.0.0
  description: A sample blog to learn about DRF
paths:
  /api/:
    get:
      operationId: root_list
      parameters:
      - in: query
        name: author
        schema:
          type: integer
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPostList'
          description: ''
    post:
      operationId: root_create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Post'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Post'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Post'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: ''
  /api/{id}/:
    get:
      operationId: root_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: ''
    put:
      operationId: root_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Post'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Post'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Post'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: ''
    patch:
      operationId: root_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPost'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPost'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPost'
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: ''
    delete:
      operationId: root_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/user/{id}/:
    get:
      operationId: user_list
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - user
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPostList'
          description: ''
components:
  schemas:
    PaginatedPostList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/Post'
    PatchedPost:
      type: object
      properties:
        title:
          type: string
          title: Название записи
          maxLength: 255
        description:
          type: string
          title: Краткое описание
          maxLength: 500
        text:
          type: string
          title: Полный текст записи
        category:
          type: integer
          title: Категория
        create:
          type: string
          format: date-time
          readOnly: true
          title: Время добавления
        update:
          type: string
          format: date-time
          readOnly: true
          title: Время обновления
        fixed:
          type: boolean
          title: Прикреплено
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          title: Статус записи
        slug:
          type: string
          title: URL
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        tags:
          type: array
          items:
            type: string
    Post:
      type: object
      properties:
        title:
          type: string
          title: Название записи
          maxLength: 255
        description:
          type: string
          title: Краткое описание
          maxLength: 500
        text:
          type: string
          title: Полный текст записи
        category:
          type: integer
          title: Категория
        create:
          type: string
          format: date-time
          readOnly: true
          title: Время добавления
        update:
          type: string
          format: date-time
          readOnly: true
          title: Время обновления
        fixed:
          type: boolean
          title: Прикреплено
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          title: Статус записи
        slug:
          type: string
          title: URL
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        tags:
          type: array
          items:
            type: string
      required:
      - create
      - description
      - tags
      - text
      - title
      - update
    StatusEnum:
      enum:
      - published
      - draft
      type: string
      description: |-
        * `published` - Опубликовано
        * `draft` - Черновик
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
